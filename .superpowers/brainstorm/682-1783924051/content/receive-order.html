<h2>第五问：你这边怎么接单？</h2>
<p class="subtitle">她提交订单后，你怎么知道要做啥</p>

<div class="options">
  <div class="option" data-choice="仅小程序" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>📱 打开小程序看</h3>
      <p>你打开小程序/管理后台，看到待处理订单列表，手动标记"已做"</p>
    </div>
  </div>
  <div class="option" data-choice="微信通知" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>🔔 微信通知推送</h3>
      <p>微信发通知给你，点开看她要吃啥</p>
    </div>
  </div>
  <div class="option" data-choice="都行" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>✅ 两样都要</h3>
      <p>小程序里能看到 + 微信也通知一下</p>
    </div>
  </div>
</div>

<div style="background:#2a2a3e;border-radius:8px;padding:12px;margin-top:20px;font-size:12px;color:#aaa">
  💡 注：微信通知需要"订阅消息"功能，小程序发布后可以申请。如果不想搞太复杂，A方案最简单。
</div>
