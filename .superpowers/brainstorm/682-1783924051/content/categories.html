<h2>第三问：要不要分类？</h2>
<p class="subtitle">菜多起来之后，菜单怎么组织</p>

<div class="options">
  <div class="option" data-choice="有分类" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>📂 要分类</h3>
      <p>比如：荤菜/素菜/汤/凉菜/主食，按分类浏览</p>
    </div>
  </div>
  <div class="option" data-choice="无分类" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>📄 不分类</h3>
      <p>一个列表到底，按最近更新或最受欢迎排序</p>
    </div>
  </div>
  <div class="option" data-choice="搜索" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>🔍 不分类 + 搜索</h3>
      <p>不设分类，但可以搜菜名，方便找</p>
    </div>
  </div>
</div>
