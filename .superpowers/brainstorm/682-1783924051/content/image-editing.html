<h2>图片编辑功能 — 要多强？</h2>
<p class="subtitle">上传菜品照片可以编辑，但编辑到什么程度？</p>

<div class="options">
  <div class="option" data-choice="基本" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>📸 基本裁剪</h3>
      <p>上传照片后能裁剪、旋转、调亮度。够用就行</p>
    </div>
  </div>
  <div class="option" data-choice="中等" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>🎨 还能加文字/贴纸</h3>
      <p>裁剪 + 加文字（菜名水印）+ 滤镜 + 简单贴纸</p>
    </div>
  </div>
  <div class="option" data-choice="全部功能" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>🖼️ 完整修图</h3>
      <p>上面全有 + 画笔涂鸦 + 模糊/马赛克 + 加边框</p>
    </div>
  </div>
</div>
