<h2>第六问：女朋友那边有啥额外功能？</h2>
<p class="subtitle">她除了点菜，还能干点啥</p>

<div class="options" data-multiselect>
  <div class="option" data-choice="评价" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>⭐ 评价/打分</h3>
      <p>吃完给个评分，帮你知道自己哪道菜最受欢迎</p>
    </div>
  </div>
  <div class="option" data-choice="留言" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>💬 留言备注</h3>
      <p>点菜时能写备注，比如"少放辣"、"多加点葱"</p>
    </div>
  </div>
  <div class="option" data-choice="收藏" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>❤️ 收藏/想吃</h3>
      <p>看到想吃的菜可以先收藏，下次直接点</p>
    </div>
  </div>
  <div class="option" data-choice="历史" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>📜 点单历史</h3>
      <p>能看到自己之前点过啥、点了多少次</p>
    </div>
  </div>
  <div class="option" data-choice="以上都要" onclick="toggleSelect(this)">
    <div class="letter">E</div>
    <div class="content">
      <h3>✅ 以上全部</h3>
      <p>来都来了，全都要</p>
    </div>
  </div>
  <div class="option" data-choice="只有点菜" onclick="toggleSelect(this)">
    <div class="letter">F</div>
    <div class="content">
      <h3>❌ 只要点菜</h3>
      <p>能点菜就行，别搞太复杂</p>
    </div>
  </div>
</div>
<p style="font-size:12px;color:#888;margin-top:8px">💡 多选 — 点几个都行</p>
