<h2>第四问：点单数量方式？</h2>
<p class="subtitle">她一次能点几个菜？</p>

<div class="options">
  <div class="option" data-choice="单次单菜" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>一次点一个</h3>
      <p>选一道菜 → 提交 → 你去煮。吃完再点下一道</p>
    </div>
  </div>
  <div class="option" data-choice="购物车" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>购物车模式</h3>
      <p>一次选多道菜加入购物车，一起提交。适合一顿饭点几道</p>
    </div>
  </div>
  <div class="option" data-choice="两个都要" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>两种都可以</h3>
      <p>也能点单个，也能加购物车攒几个一起下</p>
    </div>
  </div>
</div>
